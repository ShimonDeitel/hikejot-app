name: Hikejot
options:
  bundleIdPrefix: com.shimondeitel.hikejot
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Hikejot:
    type: application
    platform: iOS
    sources:
      - path: Hikejot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hikejot
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Hikejot/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  HikejotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: HikejotTests
      - path: Hikejot.storekit
    dependencies:
      - target: Hikejot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hikejot.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  HikejotUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: HikejotUITests
    dependencies:
      - target: Hikejot
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.hikejot.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Hikejot:
    build:
      targets:
        Hikejot: all
        HikejotTests: [test]
        HikejotUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Hikejot.storekit
    test:
      config: Debug
      storeKitConfiguration: Hikejot.storekit
      targets:
        - HikejotTests
        - HikejotUITests
    archive:
      config: Release
